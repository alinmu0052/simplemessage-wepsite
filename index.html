<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You Umar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid #4CAF50;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin: 10px 0;
    }
    p {
      color: #555;
      font-size: 16px;
      line-height: 1.5;
    }
    .reply-box {
      margin-top: 20px;
      text-align: left;
    }
    label {
      font-size: 14px;
      color: #333;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 8px;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      resize: none;
    }
    textarea:focus {
      outline: none;
      border-color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="umar.jpg" alt="Photo of Umar Bashar Dan Tara">
    <h1>Thank You, Umar Bashar Dan Tara!</h1>
    <p>Thanks for everything you’ve done for me. I really appreciate your help and friendship 🙏</p>
    <p>QUESTIONNAIRE?</p>
    <p>Ya Nelfund</p>
    <p></p>What's Your Target In Computer Science</p>
    <p>Dan Allah Ka Dawo Gida</p>
    <div class="reply-box">
      <label for="reply">Your reply:</label>
      <textarea id="reply" placeholder="Write your reply here..."></textarea>
    </div>
  </div>
</body>
</html>
